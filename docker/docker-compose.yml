services:
  ep2-crypto:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - EP2_DB_URL=postgresql://ep2:${POSTGRES_PASSWORD}@timescaledb:5432/ep2_crypto
    ports:
      - "8000:8000"
    volumes:
      # Persist trained models across container restarts
      - models:/app/models
      # Bind-mount scripts/ so edits are reflected without rebuilding (dev hot-reload)
      - ../scripts:/app/scripts:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ep2
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ep2_crypto
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ep2 -d ep2_crypto"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/trading_pnl.json
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
  # Named volume for trained model artifacts; survives container restarts and rebuilds
  models:
