services:
  ep2-crypto:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - EP2_DB_URL=postgresql://ep2:${POSTGRES_PASSWORD:-ep2_secret}@timescaledb:5432/ep2_crypto
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ep2
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ep2_secret}
      POSTGRES_DB: ep2_crypto
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ep2 -d ep2_crypto"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
